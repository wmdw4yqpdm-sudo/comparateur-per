<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CGP SaaS - PER Intelligence Platform</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#031f94;
  --primary-dark:#02145f;
  --accent:#0ea5e9;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
}

body{
  font-family:system-ui,Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  padding:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.topbar{display:flex;gap:14px;align-items:center}
.logo{height:55px;background:white;padding:6px;border-radius:10px}
.title{font-size:22px;font-weight:900}
.subtitle{font-size:13px;opacity:.85}

.container{max-width:1050px;margin:auto;padding:20px}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}

input{
  width:100%;padding:10px;margin:6px 0;
  border-radius:10px;border:1px solid #e2e8f0;
}

button{
  width:100%;padding:12px;border:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;font-weight:800;
  cursor:pointer;
}

/* LOADER SaaS */
.loader{
  display:none;
  text-align:center;
  margin-top:10px;
}
.spinner{
  width:46px;height:46px;margin:10px auto;
  border-radius:50%;
  border:3px solid rgba(3,31,148,.2);
  border-top:3px solid var(--primary);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.bar{
  height:6px;
  width:0;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--success));
  border-radius:20px;
  transition:width .3s;
}

.step{
  font-size:13px;
  margin-top:8px;
  color:var(--primary-dark);
  min-height:18px;
}

.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.kpi div{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:20px;
  font-size:12px;
  background:#eef2ff;
  color:var(--primary);
  font-weight:700;
}

.good{color:var(--success)}
.mid{color:var(--warning)}
.bad{color:var(--danger)}

.reco{
  background:#ecfeff;
  border-left:5px solid var(--accent);
  padding:12px;
  border-radius:12px;
}

.small{font-size:13px;color:#64748b}

</style>
</head>

<body>

<header>
<div class="topbar">
<img class="logo" src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80">
<div>
<div class="title">CGP SaaS - PER Intelligence Platform</div>
<div class="subtitle">Simulation patrimoniale & optimisation retraite</div>
</div>
</div>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Profil client</h3>
<input id="firstname" placeholder="Prénom">
<input id="name" placeholder="Nom">
<input id="job" placeholder="Profession">
<input id="income" type="number" placeholder="Revenus">
<input id="age" type="number" placeholder="Âge">
<input id="horizon" type="number" placeholder="Horizon (années)">
<input id="monthly" type="number" placeholder="Versement mensuel (€)">

<button onclick="start()">Lancer simulation</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<div class="bar" id="bar"></div>
<div class="step" id="step">Initialisation...</div>
</div>
</div>

<div class="card">
<h3>Dashboard</h3>
<div id="kpi"></div>
</div>

</div>

<div class="card">
<h3>Classement PER</h3>
<div id="results"></div>
</div>

<div class="card">
<h3>Projection retraite</h3>
<div id="projection"></div>
</div>

<div class="card">
<button onclick="exportPDF()">Télécharger rapport CGP PDF</button>
</div>

</div>

<script>

const per=[
{name:"Generali",e:0.9,x:0,r1:6,r2:8.5},
{name:"Groupama",e:1.8,x:1,r1:4.3,r2:5.2},
{name:"MMA",e:2.6,x:1.4,r1:3.6,r2:4.2},
{name:"April",e:3.2,x:2,r1:3.1,r2:3.8},
{name:"Axa",e:4.4,x:2.5,r1:2.9,r2:3.5}
];

function score(p){
let r=(p.r1+p.r2)/2;
return r-(p.e*0.6)-(p.x*0.4);
}

function color(r){return r<3.5?"#dc2626":r<5?"#f59e0b":"#16a34a"}

function start(){

document.getElementById("loader").style.display="block";

let bar=document.getElementById("bar");
let step=document.getElementById("step");

let steps=[
"Analyse du profil...",
"Analyse des frais...",
"Benchmark rendement...",
"Optimisation fiscale...",
"Construction scoring...",
"Finalisation CGP..."
];

let i=0,p=0;

let t=setInterval(()=>{
  p+=1.2;
  if(p>100)p=100;

  bar.style.width=p+"%";

  if(Math.floor(p)%18===0 && i<steps.length){step.innerText=steps[i++];}

  if(p>=100){clearInterval(t);setTimeout(run,500)}
},35);
}

function run(){

document.getElementById("loader").style.display="none";

let age=+document.getElementById("age").value;
let income=+document.getElementById("income").value;
let horizon=+document.getElementById("horizon").value;
let monthly=+document.getElementById("monthly").value;
let job=document.getElementById("job").value;

let ranked=per.map(p=>({...p,score:score(p)})).sort((a,b)=>b.score-a.score);

let best=ranked[0];

// KPI
let risk=best.score>5?"Optimisé":best.score>3?"Moyen":"Faible";

document.getElementById("kpi").innerHTML=`
<div class='kpi'>
<div><b>Score</b><br>${best.score.toFixed(1)}/10</div>
<div><b>Top PER</b><br>${best.name}</div>
<div><b>Niveau</b><br>${risk}</div>
</div>`;

// ranking
let html="";
ranked.forEach((p,i)=>{
let r=(p.r1+p.r2)/2;
html+=`<div>
<span class='badge'>#${i+1}</span> <b>${p.name}</b><br>
<span style='color:${color(r)}'>${p.r1}% → ${p.r2}%</span><br>
Frais: ${p.e}% / ${p.x}% | Score: ${p.score.toFixed(2)}
</div><br>`;
});

document.getElementById("results").innerHTML=html;

// projection
let r=0.06;
let capital=monthly*12*((Math.pow(1+r,horizon)-1)/r);

let final=Math.round(capital);

let message=`
<div class='reco'>
<b>Projection retraite personnalisée</b><br><br>
Profil: ${job}<br>
Versement mensuel: ${monthly}€<br>
Durée: ${horizon} ans<br><br>
<b>Capital estimé:</b> ${final.toLocaleString()} €<br><br>
<div class='small'>Simulation indicative basée sur rendement moyen 6%</div>
</div>`;

document.getElementById("projection").innerHTML=message;
}

function exportPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.setFontSize(14);
doc.text("Rapport CGP - PER SaaS",10,10);

doc.setFontSize(10);
doc.text(document.getElementById("results").innerText,10,20);

doc.save("CGP-report.pdf");
}

</script>

</body
