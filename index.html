<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comparateur PER CGP Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#031f94;
  --primary-dark:#02145f;
  --accent:#0ea5e9;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --bg:#f4f6f8;
}

body{
  font-family:system-ui,Arial;
  margin:0;
  background:var(--bg);
}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  padding:22px;
}

.topbar{display:flex;gap:16px;align-items:center}
.logo{height:55px;background:white;padding:6px;border-radius:10px}
.title{font-size:24px;font-weight:800}
.subtitle{font-size:13px;opacity:.85}

.container{max-width:1000px;margin:auto;padding:20px}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}

input{
  width:100%;padding:10px;margin:6px 0;
  border-radius:10px;border:1px solid #e2e8f0;
}

button{
  width:100%;padding:12px;border:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;font-weight:700;
  cursor:pointer;
}

.client-box{
  background:#eef2ff;
  padding:12px;border-radius:12px;
  border-left:5px solid var(--primary);
}

.company{padding:12px;border-bottom:1px solid #eee}
.rank{font-weight:800}
.best{color:var(--success);font-weight:700}
.medium{color:var(--warning);font-weight:700}
.low{color:var(--danger);font-weight:700}

.loader-box{text-align:center;display:none}
.hourglass{
  width:40px;height:40px;margin:10px auto;
  border:4px solid var(--primary);
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.progress{height:18px;background:#e5e7eb;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--accent),var(--success))}

.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi div{background:#f8fafc;padding:10px;border-radius:10px;text-align:center}

.reco{background:#ecfeff;padding:12px;border-radius:12px;border-left:5px solid var(--accent)}
</style>
</head>

<body>

<header>
<div class="topbar">
<img class="logo" src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80">
<div>
<div class="title">Comparateur PER CGP Premium</div>
<div class="subtitle">Analyse patrimoniale avancée</div>
</div>
</div>
</header>

<div class="container">

<div class="card">
<h2>Profil client</h2>
<input id="firstname" placeholder="Prénom">
<input id="name" placeholder="Nom">
<input id="profession" placeholder="Profession">
<input id="income" type="number" placeholder="Revenus">
<input id="age" type="number" placeholder="Âge">
<input id="horizon" type="number" placeholder="Horizon (années)">
<input id="monthly" type="number" placeholder="Versement mensuel (€)">

<button onclick="start()">Analyser</button>

<div class="loader-box" id="loader">
<div class="hourglass"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="txt">Analyse...</div>
</div>
</div>

<div class="card">
<h2>Dashboard</h2>
<div id="kpi"></div>
</div>

<div class="card">
<h2>Classement</h2>
<div id="results"></div>
</div>

<div class="card">
<h2>Projection retraite</h2>
<div id="projection"></div>
</div>

</div>

<script>

const data=[
{name:"Generali",entry:0.9,exit:0,y1:6,y2:8.5},
{name:"Groupama",entry:1.8,exit:1,y1:4.3,y2:5.2},
{name:"MMA",entry:2.6,exit:1.4,y1:3.6,y2:4.2},
{name:"April",entry:3.2,exit:2,y1:3.1,y2:3.8},
{name:"Axa",entry:4.4,exit:2.5,y1:2.9,y2:3.5}
];

function score(c){
let r=(c.y1+c.y2)/2;
return r-(c.entry*0.6)-(c.exit*0.4);
}

function color(r){return r<3.5?"#dc2626":r<5?"#f59e0b":"#16a34a"}

function start(){

document.getElementById("loader").style.display="block";
let b=document.getElementById("bar");
let t=document.getElementById("txt");
let steps=["Profil...","Frais...","Rendement...","Optimisation...","Finalisation..."];
let i=0,p=0;

// loader fluide 60s
let timer=setInterval(()=>{
  p+=1.6; // ~60s total
  if(p>100)p=100;
  b.style.width=p+"%";

  if(Math.floor(p)%20===0 && i<steps.length){t.innerText=steps[i++];}

  if(p>=100){clearInterval(timer);setTimeout(run,400)}
},600);
}

function run(){

document.getElementById("loader").style.display="none";

let age=+document.getElementById("age").value;
let income=+document.getElementById("income").value;
let horizon=+document.getElementById("horizon").value;
let monthly=+document.getElementById("monthly").value;

let ranked=data.map(c=>({...c,score:score(c)})).sort((a,b)=>b.score-a.score);

let best=ranked[0];

document.getElementById("kpi").innerHTML=`
<div class='kpi'>
<div><b>Score</b><br>${best.score.toFixed(1)}/10</div>
<div><b>Top PER</b><br>${best.name}</div>
<div><b>Profil</b><br>Optimisation active</div>
</div>`;

let html="";
ranked.forEach((c,i)=>{
let r=(c.y1+c.y2)/2;
html+=`<div class='company'>
<div class='rank'>${i+1}. ${c.name}</div>
<div>Rendement: <span style='color:${color(r)}'>${c.y1}% → ${c.y2}%</span></div>
<div>Frais: ${c.entry}% / ${c.exit}%</div>
<div>Score: ${c.score.toFixed(2)}</div>
</div>`;
});

document.getElementById("results").innerHTML=html;

// projection capital
let years=horizon||20;
let r=0.06;
let capital=monthly*12*((Math.pow(1+r,years)-1)/r);

let final=capital.toFixed(0);

document.getElementById("projection").innerHTML=`
<div class='reco'>
<b>Projection retraite</b><br>
Versement: ${monthly}€/mois<br>
Horizon: ${years} ans<br>
Capital estimé: ${Number(final).toLocaleString()}€
</div>`;

}

</script>

</body>
</html>
