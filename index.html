<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comparateur PER - Outil CGP Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#0b1f4b;
  --accent:#2563eb;
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --good:#16a34a;
  --mid:#f59e0b;
  --bad:#dc2626;
}

body{
  font-family:system-ui,Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  background:var(--primary);
  color:white;
  padding:18px 22px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  height:48px;
  background:white;
  padding:6px;
  border-radius:8px;
}

.title{
  font-size:20px;
  font-weight:800;
}

.subtitle{
  font-size:12px;
  opacity:.8;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

h3{
  margin-top:0;
  font-size:16px;
  color:var(--primary);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #e5e7eb;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:white;
  border:0;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

button:hover{opacity:.9}

/* loader simple pro */
.loader{
  display:none;
  margin-top:10px;
  color:var(--muted);
  font-size:13px;
}

.spinner{
  width:18px;
  height:18px;
  border:2px solid #ddd;
  border-top:2px solid var(--accent);
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:inline-block;
  margin-right:6px;
}

@keyframes spin{to{transform:rotate(360deg)}}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

td,th{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.badge{
  padding:4px 8px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
}

.good{background:#dcfce7;color:var(--good)}
.mid{background:#fef3c7;color:var(--mid)}
.bad{background:#fee2e2;color:var(--bad)}

.reco{
  background:#eff6ff;
  padding:12px;
  border-left:4px solid var(--accent);
  border-radius:10px;
  font-size:13px;
}

.small{font-size:12px;color:var(--muted)}

</style>
</head>

<body>

<header>
<div class="topbar">
<img class="logo" src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80">
<div>
<div class="title">Comparateur PER - Outil CGP Pro</div>
<div class="subtitle">Moteur de sélection multi-assureurs</div>
</div>
</div>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Profil client</h3>
<input id="age" type="number" placeholder="Âge">
<input id="income" type="number" placeholder="Revenus annuels">
<input id="horizon" type="number" placeholder="Horizon (années)">
<input id="monthly" type="number" placeholder="Versement mensuel">
<button onclick="run()">Analyser</button>

<div class="loader" id="loader">
<span class="spinner"></span>Analyse du dossier en cours...
</div>
</div>

<div class="card">
<h3>Recommandation</h3>
<div id="reco"></div>
</div>

</div>

<div class="card">
<h3>Comparatif assureurs</h3>
<div id="table"></div>
</div>

<div class="card">
<h3>Projection</h3>
<div id="projection"></div>
</div>

</div>

<script>

const insurers=[
{name:"Generali",risk:"equilibre",fee:1.2,y:7.2},
{name:"AXA",risk:"prudent",fee:2.0,y:4.8},
{name:"Groupama",risk:"equilibre",fee:1.6,y:5.6},
{name:"MMA",risk:"prudent",fee:2.3,y:4.2},
{name:"April",risk:"dynamique",fee:3.1,y:6.5}
];

function suitability(i,profile){
let score=i.y - i.fee*1.2;
if(profile.horizon>15 && i.risk=="dynamique") score+=1.2;
if(profile.horizon<10 && i.risk=="prudent") score+=1;
return score;
}

function run(){

document.getElementById("loader").style.display="block";

setTimeout(()=>{

let age=+document.getElementById("age").value;
let income=+document.getElementById("income").value;
let horizon=+document.getElementById("horizon").value;
let monthly=+document.getElementById("monthly").value;

let profile={age,income,horizon,monthly};

let ranked=insurers.map(i=>({...i,score:suitability(i,profile)}))
.sort((a,b)=>b.score-a.score);

// recommendation
let best=ranked[0];

document.getElementById("reco").innerHTML=`
<div class='reco'>
<b>Recommandation principale</b><br>
${best.name} est le plus adapté au profil client.<br><br>
<span class='small'>Raison: équilibre rendement / frais / horizon</span>
</div>`;

// table
let html=`<table>
<tr><th>Assureur</th><th>Risque</th><th>Frais</th><th>Perf</th><th>Score</th></tr>`;

ranked.forEach(i=>{
let cls=i.score>6?"good":i.score>4?"mid":"bad";
html+=`
<tr>
<td>${i.name}</td>
<td>${i.risk}</td>
<td>${i.fee}%</td>
<td>${i.y}%</td>
<td><span class='badge ${cls}'>${i.score.toFixed(2)}</span></td>
</tr>`;
});

html+="</table>";

document.getElementById("table").innerHTML=html;

// projection
let r=0.06;
let capital=monthly*12*((Math.pow(1+r,horizon)-1)/r);

document.getElementById("projection").innerHTML=`
<div class='reco'>
<b>Projection client</b><br>
Capital estimé: ${Math.round(capital).toLocaleString()} €<br>
Hypothèse rendement: 6% moyen
</div>`;

// hide loader

document.getElementById("loader").style.display="none";

},800);
}

</script>

</body>
</html>
