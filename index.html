<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comparateur PER Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  /* Palette inspirée style cabinet / Alyor (bleu profond + blanc + gris + vert) */
  --primary:#031f94;
  --primary-dark:#02145f;
  --accent:#0ea5e9;
  --success:#16a34a;
  --warning:#d97706;
  --danger:#dc2626;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
}

body{
  font-family:Arial, sans-serif;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

/* HEADER PREMIUM */
header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  padding:22px 25px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.topbar{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  height:58px;
  background:white;
  padding:6px 10px;
  border-radius:10px;
}

.title-block{
  display:flex;
  flex-direction:column;
}

.title{
  font-size:26px;
  font-weight:800;
}

.subtitle{
  font-size:13px;
  opacity:0.9;
}

.container{
  max-width:980px;
  margin:auto;
  padding:22px;
}

.card{
  background:var(--card);
  padding:20px;
  margin-bottom:22px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  border:1px solid #eef2f7;
}

h2{
  margin-top:0;
  color:var(--primary-dark);
}

/* INPUT PREMIUM */
input{
  width:100%;
  padding:11px;
  margin:7px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
  box-sizing:border-box;
  transition:0.2s;
}

input:focus{
  border-color:var(--accent);
  outline:none;
  box-shadow:0 0 0 3px rgba(14,165,233,0.15);
}

button{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;
  border:none;
  padding:13px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
  font-size:16px;
  font-weight:700;
  box-shadow:0 6px 16px rgba(3,31,148,0.25);
}

button:hover{
  transform:translateY(-1px);
}

.client-box{
  background:#eef2ff;
  padding:14px;
  border-radius:12px;
  margin-bottom:15px;
  border-left:5px solid var(--primary);
}

.company{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
}

.rank{
  font-weight:800;
  font-size:17px;
  margin-bottom:6px;
}

.best{color:var(--success);font-weight:700;}
.medium{color:var(--warning);font-weight:700;}
.low{color:var(--danger);font-weight:700;}

/* LOADER PREMIUM */
.loader-box{
  display:none;
  margin-top:20px;
}

.progress{
  width:100%;
  height:22px;
  background:#e5e7eb;
  border-radius:20px;
  overflow:hidden;
}

.bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--success));
  transition:width 1s linear;
}

.loading-text{
  margin-top:10px;
  text-align:center;
  font-weight:bold;
  color:var(--primary-dark);
}

</style>
</head>

<body>

<header>
<div class="topbar">

<img 
src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80"
class="logo"
alt="Alyor"
>

<div class="title-block">
<div class="title">Comparateur PER Premium</div>
<div class="subtitle">Analyse patrimoniale personnalisée</div>
</div>

</div>
</header>

<div class="container">

<div class="card">
<h2>Fiche client patrimoniale</h2>

<input id="firstname" placeholder="Prénom">
<input id="name" placeholder="Nom">
<input id="profession" placeholder="Profession">
<input id="income" type="number" placeholder="Revenus annuels (€)">
<input id="age" type="number" placeholder="Âge">
<input id="objectif" placeholder="Objectif retraite (ex: confort, optimisation)">
<input id="horizon" type="number" placeholder="Horizon placement (années)">
<input id="tmi" type="number" placeholder="TMI (%)">

<button onclick="startLoading()">Lancer l’analyse</button>

<div class="loader-box" id="loaderBox">
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="loading-text" id="loadingText">Analyse patrimoniale en cours...</div>
</div>

</div>

<div class="card">
<h2>Classement des PER</h2>
<div id="results"></div>
</div>

<div class="card">
<h2>Graphique comparatif</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const companies = [
{ name:"Generali", entry:0.95, exit:0, yieldMin:5.77, yieldMax:8.70 },
{ name:"Groupama", entry:1.8, exit:1, yieldMin:4.3, yieldMax:5.2 },
{ name:"MMA", entry:2.6, exit:1.4, yieldMin:3.6, yieldMax:4.2 },
{ name:"April", entry:3.2, exit:2, yieldMin:3.1, yieldMax:3.8 },
{ name:"Axa", entry:4.4, exit:2.5, yieldMin:2.9, yieldMax:3.5 }
];

function advancedScore(c, age, income, horizon, tmi){
  const rendement=(c.yieldMin+c.yieldMax)/2;
  const frais=(c.entry*0.6)+(c.exit*0.4);
  const profilFactor=(horizon>15?1.2:1)+(tmi>30?1.1:1);

  return (rendement*profilFactor) - frais;
}

function startLoading(){

document.getElementById("results").innerHTML="";
document.getElementById("loaderBox").style.display="block";

let bar=document.getElementById("bar");
let txt=document.getElementById("loadingText");

let steps=[
"Analyse patrimoniale...",
"Étude du profil investisseur...",
"Analyse des frais...",
"Optimisation fiscale...",
"Calcul du rendement net...",
"Finalisation recommandation..."
];

let i=0;
let progress=0;

let timer=setInterval(()=>{
progress+=1;
bar.style.width=progress+"%";

if(progress%20===0 && i<steps.length){
txt.innerHTML=steps[i];
i++;
}

if(progress>=100){
clearInterval(timer);
setTimeout(simulate,400);
}

},40);

}

function simulate(){

document.getElementById("loaderBox").style.display="none";

const firstname=document.getElementById("firstname").value;
const lastname=document.getElementById("name").value;
const profession=document.getElementById("profession").value;
const age=Number(document.getElementById("age").value);
const income=Number(document.getElementById("income").value);
const horizon=Number(document.getElementById("horizon").value);
const tmi=Number(document.getElementById("tmi").value);

let ranked=companies
.map(c=>({...c,score:advancedScore(c,age,income,horizon,tmi)}))
.sort((a,b)=>b.score-a.score);

let html=`<div class="client-box"><strong>${firstname} ${lastname}</strong><br>${profession} | ${age} ans | ${income}€</div>`;

ranked.forEach((c,i)=>{
html+=`
<div class="company">
<div class="rank">${i+1}. ${c.name}</div>
<div>Rendement: <span class="best">${c.yieldMin}% → ${c.yieldMax}%</span></div>
<div>Frais entrée: ${c.entry}% | sortie: ${c.exit}%</div>
<div>Score: ${c.score.toFixed(2)}</div>
</div>`;
});

document.getElementById("results").innerHTML=html;

const ctx=document.getElementById("chart");

if(window.myChart) window.myChart.destroy();

window.myChart=new Chart(ctx,{type:"bar",data:{labels:ranked.map(c=>c.name),datasets:[{label:"Rendement",data:ranked.map(c=>c.yieldMax)},{label:"Frais",data:ranked.map(c=>c.entry)}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}});

}

</script>

</body>
</html>
