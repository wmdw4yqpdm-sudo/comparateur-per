<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comparateur PER Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --primary:#031f94;
  --primary-dark:#02145f;
  --accent:#0ea5e9;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
}

body{
  font-family:Arial, sans-serif;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  padding:22px 25px;
  box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.topbar{
  display:flex;
  align-items:center;
  gap:18px;
}

.logo{
  height:58px;
  background:white;
  padding:6px 10px;
  border-radius:10px;
}

.title{
  font-size:26px;
  font-weight:800;
}

.subtitle{
  font-size:13px;
  opacity:0.9;
}

.container{
  max-width:980px;
  margin:auto;
  padding:22px;
}

.card{
  background:var(--card);
  padding:20px;
  margin-bottom:22px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
  border:1px solid #eef2f7;
}

input{
  width:100%;
  padding:11px;
  margin:7px 0;
  border:1px solid #e2e8f0;
  border-radius:10px;
}

button{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;
  border:none;
  padding:13px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
  font-size:16px;
  font-weight:700;
}

.client-box{
  background:#eef2ff;
  padding:14px;
  border-radius:12px;
  margin-bottom:15px;
  border-left:5px solid var(--primary);
}

.company{
  padding:14px;
  border-bottom:1px solid #f1f5f9;
}

.rank{
  font-weight:800;
  font-size:17px;
}

/* LOADER 3D */
.loader-box{
  display:none;
  margin-top:20px;
  text-align:center;
}

.progress{
  width:100%;
  height:22px;
  background:#e5e7eb;
  border-radius:20px;
  overflow:hidden;
}

.bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--success));
  transition:width 0.6s linear;
}

.loading-text{
  margin-top:10px;
  font-weight:bold;
  color:var(--primary-dark);
}

/* Hourglass 3D */
.hourglass{
  width:50px;
  height:50px;
  margin:10px auto;
  border:4px solid var(--primary);
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin3d 1s linear infinite;
  transform-style:preserve-3d;
}

@keyframes spin3d{
  0%{transform:rotateX(0deg) rotateY(0deg);}
  100%{transform:rotateX(360deg) rotateY(360deg);}
}

</style>
</head>

<body>

<header>
<div class="topbar">
<img src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80" class="logo">
<div>
<div class="title">Comparateur PER Premium</div>
<div class="subtitle">Analyse patrimoniale personnalisée</div>
</div>
</div>
</header>

<div class="container">

<div class="card">
<h2>Fiche client</h2>
<input id="firstname" placeholder="Prénom">
<input id="name" placeholder="Nom">
<input id="profession" placeholder="Profession">
<input id="income" type="number" placeholder="Revenus annuels">
<input id="age" type="number" placeholder="Âge">
<input id="objectif" placeholder="Objectif retraite">
<input id="horizon" type="number" placeholder="Horizon placement (années)">

<button onclick="startLoading()">Lancer analyse</button>

<div class="loader-box" id="loaderBox">
<div class="hourglass"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div class="loading-text" id="loadingText">Analyse patrimoniale en cours...</div>
</div>
</div>

<div class="card">
<h2>Classement</h2>
<div id="results"></div>
</div>

<div class="card">
<h2>Graphique</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

const companies=[
{name:"Generali",entry:0.95,exit:0,yieldMin:5.77,yieldMax:8.70},
{name:"Groupama",entry:1.8,exit:1,yieldMin:4.3,yieldMax:5.2},
{name:"MMA",entry:2.6,exit:1.4,yieldMin:3.6,yieldMax:4.2},
{name:"April",entry:3.2,exit:2,yieldMin:3.1,yieldMax:3.8},
{name:"Axa",entry:4.4,exit:2.5,yieldMin:2.9,yieldMax:3.5}
];

function yieldColor(v){
if(v<3.5) return "#dc2626";
if(v<5) return "#f59e0b";
return "#16a34a";
}

function score(c){
let avg=(c.yieldMin+c.yieldMax)/2;
return avg-(c.entry*0.6)-(c.exit*0.4);
}

function startLoading(){

document.getElementById("results").innerHTML="";
document.getElementById("loaderBox").style.display="block";

let bar=document.getElementById("bar");
let txt=document.getElementById("loadingText");

let steps=[
"Analyse client...",
"Étude frais...",
"Analyse rendement...",
"Optimisation...",
"Calcul classement...",
"Finalisation..."
];

let i=0,progress=0;

let timer=setInterval(()=>{
progress++;
bar.style.width=progress+"%";

if(progress%20===0 && i<steps.length){txt.innerHTML=steps[i];i++;}

if(progress>=100){clearInterval(timer);setTimeout(simulate,500);}

},600); // 1 minute total
}

function simulate(){

document.getElementById("loaderBox").style.display="none";

const firstname=document.getElementById("firstname").value;
const lastname=document.getElementById("name").value;
const profession=document.getElementById("profession").value;
const age=document.getElementById("age").value;
const income=document.getElementById("income").value;
const horizon=document.getElementById("horizon").value;

let ranked=companies.map(c=>({...c,score:score(c)})).sort((a,b)=>b.score-a.score);

let html=`<div class='client-box'><strong>${firstname} ${lastname}</strong><br>${profession} | ${age} ans | ${income}€</div>`;

ranked.forEach((c,i)=>{
let avg=(c.yieldMin+c.yieldMax)/2;
let col=yieldColor(avg);

html+=`
<div class='company'>
<div class='rank'>${i+1}. ${c.name}</div>
<div>Rendement: <span style='color:${col};font-weight:bold'>${c.yieldMin}% → ${c.yieldMax}%</span></div>
<div>Frais: ${c.entry}% | ${c.exit}%</div>
<div>Score: ${c.score.toFixed(2)}</div>
</div>`;
});

document.getElementById("results").innerHTML=html;

const ctx=document.getElementById("chart");
if(window.myChart) window.myChart.destroy();

window.myChart=new Chart(ctx,{type:"bar",data:{labels:ranked.map(c=>c.name),datasets:[{label:"Rendement",data:ranked.map(c=>c.yieldMax)},{label:"Frais",data:ranked.map(c=>c.entry)}]},options:{responsive:true,scales:{y:{beginAtZero:true}}}});

}

</script>

</body>
</html>
