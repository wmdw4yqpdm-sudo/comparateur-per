<script>

/* =========================
   SHUFFLE
========================= */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* =========================
   BASE 32 COMPAGNIES
========================= */
const companiesBase = [
{name:"Generali",entry:0.95,exit:0,yieldMin:5.77,yieldMax:8.70},

{name:"Groupama"},
{name:"MMA"},
{name:"April"},
{name:"AXA"},
{name:"SwissLife"},
{name:"Allianz"},
{name:"Aviva"},
{name:"CNP"},
{name:"AG2R"},
{name:"Malakoff"},
{name:"Gan"},
{name:"MACSF"},
{name:"Matmut"},
{name:"GMF"},
{name:"MAAF"},
{name:"Suravenir"},
{name:"Spirica"},
{name:"Cardif"},
{name:"Abeille"},
{name:"Apicil"},
{name:"Sogecap"},
{name:"BPCE Vie"},
{name:"Monceau"},
{name:"La Mondiale"},
{name:"Oradea"},
{name:"Neuflize"},
{name:"Primonial"},
{name:"UAF Life"},
{name:"Patrimoine Vie"},
{name:"SMABTP"},
{name:"Intencial"}
];

let ranked = [];
let visible = 0;
let chart;

/* =========================
   GENERATION COHERENTE
========================= */
function generateCompanies(){

let arr = [];

arr.push(companiesBase[0]); // Generali fixe

for(let i=1;i<companiesBase.length;i++){

let level = i;

/* frais augmentent progressivement */
let entry = +(1.25 + level*0.11 + Math.random()*0.20).toFixed(2);
let exit = +(0.55 + level*0.10 + Math.random()*0.20).toFixed(2);

/* plafonds */
if(entry>5) entry=5;
if(exit>5) exit=5;

/* rendement baisse progressivement */
let maxYield = +(5.5 - level*0.08 - Math.random()*0.20).toFixed(2);
if(maxYield<2.1) maxYield=2.1;

let minYield = +(maxYield - (0.7 + Math.random()*0.8)).toFixed(2);
if(minYield<1.2) minYield=1.2;

arr.push({
name:companiesBase[i].name,
entry,
exit,
yieldMin:minYield,
yieldMax:maxYield
});
}

return arr;
}

/* =========================
   SCORE
========================= */
function score(c){
const avg = (c.yieldMin+c.yieldMax)/2;
return avg - (c.entry*0.60) - (c.exit*0.40);
}

/* =========================
   CHART
========================= */
function renderChart(){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:ranked.slice(0,10).map(c=>c.name),
datasets:[
{
label:"Rendement max",
data:ranked.slice(0,10).map(c=>c.yieldMax),
backgroundColor:"#22c55e"
},
{
label:"Frais entrée",
data:ranked.slice(0,10).map(c=>c.entry),
backgroundColor:"#ef4444"
},
{
label:"Frais sortie",
data:ranked.slice(0,10).map(c=>c.exit),
backgroundColor:"#f97316"
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});
}

/* =========================
   AFFICHER LIGNE
========================= */
function addCompany(c,i){

let entry =
c.entry<=1.5 ? "best" :
c.entry<=3 ? "medium" : "low";

let exit =
c.exit<=1.2 ? "best" :
c.exit<=3 ? "medium" : "low";

let y =
c.yieldMax>=5.2 ? "best" :
c.yieldMax>=3.6 ? "medium" : "low";

let div=document.createElement("div");
div.className="company";

div.innerHTML=`
<strong>${i+1}. ${c.name}</strong><br>
Rendement : <span class="${y}">${c.yieldMin}% → ${c.yieldMax}%</span><br>
Frais entrée : <span class="${entry}">${c.entry}%</span><br>
Frais sortie : <span class="${exit}">${c.exit}%</span>
`;

document.getElementById("results").appendChild(div);

setTimeout(()=>div.classList.add("show"),50);
}

/* =========================
   BOUTON PLUS
========================= */
function showMore(){

let max = visible + 6;
if(max > ranked.length) max = ranked.length;

for(let i=visible;i<max;i++){
setTimeout(()=>addCompany(ranked[i],i),(i-visible)*100);
}

visible = max;

if(visible >= ranked.length){
document.getElementById("moreBtn").style.display="none";
}else{
document.getElementById("moreBtn").style.display="block";
}
}

/* =========================
   SIMULATION
========================= */
function simulate(){

document.getElementById("results").innerHTML="";
document.getElementById("loaderContainer").style.display="block";
document.getElementById("moreBtn").style.display="none";

visible = 0;

let progress=0;
let stepIndex=0;

const steps=[
"Accès sécurisé au comparateur privé...",
"Vérification des accès partenaires agréés...",
"Chargement des grilles exclusives assureurs...",
"Simulation des conditions de marché...",
"Analyse des frais réels négociés...",
"Croisement des données partenaires...",
"Finalisation de votre sélection..."
];

let loaderText=document.getElementById("loaderText");

let interval=setInterval(()=>{

progress += (100/85);
document.getElementById("loaderBar").style.width=progress+"%";

let newStep=Math.floor((progress/100)*steps.length);

if(newStep!==stepIndex && newStep<steps.length){
stepIndex=newStep;
loaderText.innerText=steps[stepIndex];
}

if(progress>=100){

clearInterval(interval);
document.getElementById("loaderContainer").style.display="none";

/* génération */
let companies = generateCompanies();

/* Generali premier garanti */
let generali = companies.shift();

let others = shuffle(companies).map(c=>({...c,score:score(c)}))
.sort((a,b)=>b.score-a.score);

ranked = [generali,...others];

showMore();

setTimeout(()=>renderChart(),800);

}

},100);
}

/* =========================
   BUBBLES
========================= */
const canvas=document.getElementById("bubbleCanvas");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}
resize();
window.addEventListener("resize",resize);

let bubbles=[];

for(let i=0;i<80;i++){
bubbles.push({
x:Math.random()*w,
y:Math.random()*h,
r:3+Math.random()*4,
vy:0.3+Math.random()
});
}

function animate(){

ctx.clearRect(0,0,w,h);

for(let b of bubbles){

b.y-=b.vy;

if(b.y<0){
b.y=h;
b.x=Math.random()*w;
}

ctx.beginPath();
ctx.fillStyle="#60a5fa";
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(animate);
}

animate();

</script>

<!-- AJOUTE CE BOUTON SOUS #results -->
<button id="moreBtn" onclick="showMore()" style="display:none;margin-top:15px;">
Afficher plus
</button>
