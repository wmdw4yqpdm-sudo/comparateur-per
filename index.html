<script>

/* =========================
   DATA 32 COMPAGNIES
========================= */
const names = [
"Generali","Groupama","MMA","April","AXA","SwissLife","Allianz","Aviva",
"CNP","AG2R","Malakoff","Gan","MACSF","Matmut","GMF","MAAF",
"Suravenir","Spirica","Cardif","Abeille","Apicil","Sogecap",
"BPCE Vie","Monceau","La Mondiale","Oradea","Neuflize","Primonial",
"UAF Life","Patrimoine Vie","SMABTP","Intencial"
];

let companies=[];
let ranked=[];
let visibleCount=0;
let chartInstance=null;

/* =========================
   GENERATION COHERENTE
========================= */
function buildCompanies(){

let arr=[];

for(let i=0;i<names.length;i++){

let entry = +(1 + i*0.12 + Math.random()*0.4).toFixed(2);
let exit  = +(0.4 + i*0.1 + Math.random()*0.3).toFixed(2);

if(entry>5) entry=5;
if(exit>5) exit=5;

/* rendement réaliste */
let maxYield = +(6.2 - i*0.09 - Math.random()*0.25).toFixed(2);
if(maxYield<2.2) maxYield=2.2;

let minYield = +(maxYield - (0.6 + Math.random()*0.7)).toFixed(2);
if(minYield<1.3) minYield=1.3;

arr.push({
name:names[i],
entry,
exit,
yieldMin:minYield,
yieldMax:maxYield
});
}

/* Generali toujours top */
arr[0] = {
name:"Generali",
entry:0.95,
exit:0,
yieldMin:5.77,
yieldMax:8.70
};

return arr;
}

/* =========================
   SCORE
========================= */
function score(c){
let avg=(c.yieldMin+c.yieldMax)/2;
return avg - (c.entry*0.6) - (c.exit*0.4);
}

/* =========================
   AFFICHAGE UNE COMPAGNIE
========================= */
function renderCompany(c,i){

let entryClass = c.entry<1.5?"best":c.entry<3?"medium":"low";
let exitClass  = c.exit<1.5?"best":c.exit<3?"medium":"low";
let yClass     = c.yieldMax>=5?"best":c.yieldMax>=3.5?"medium":"low";

let div=document.createElement("div");
div.className="company";

div.innerHTML=`
<strong>${i+1}. ${c.name}</strong><br>
Rendement : <span class="${yClass}">${c.yieldMin}% → ${c.yieldMax}%</span><br>
Frais entrée : <span class="${entryClass}">${c.entry}%</span><br>
Frais sortie : <span class="${exitClass}">${c.exit}%</span>
`;

document.getElementById("results").appendChild(div);
setTimeout(()=>div.classList.add("show"),50);
}

/* =========================
   AFFICHER PLUS (progressif)
========================= */
function showMore(){

let next = visibleCount + 6;
if(next > ranked.length) next = ranked.length;

for(let i=visibleCount;i<next;i++){
setTimeout(()=>renderCompany(ranked[i],i),(i-visibleCount)*120);
}

visibleCount = next;

if(visibleCount >= ranked.length){
document.getElementById("btnMore").style.display="none";
}else{
document.getElementById("btnMore").style.display="block";
}
}

/* =========================
   CHART (SAFE)
========================= */
function renderChart(){

if(chartInstance) chartInstance.destroy();

chartInstance = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:ranked.slice(0,10).map(c=>c.name),
datasets:[
{
label:"Rendement max",
data:ranked.slice(0,10).map(c=>c.yieldMax),
backgroundColor:"#22c55e"
},
{
label:"Frais entrée",
data:ranked.slice(0,10).map(c=>c.entry),
backgroundColor:"#ef4444"
},
{
label:"Frais sortie",
data:ranked.slice(0,10).map(c=>c.exit),
backgroundColor:"#f97316"
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});
}

/* =========================
   SIMULATION (NE TOUCHE PAS TON LOADER HTML)
========================= */
function simulate(){

document.getElementById("results").innerHTML="";
document.getElementById("btnMore").style.display="none";
document.getElementById("loaderContainer").style.display="block";

visibleCount=0;

/* loader animation identique */
let progress=0;
let step=0;

const steps=[
"Accès sécurisé au comparateur privé...",
"Vérification des accès partenaires agréés...",
"Chargement des grilles exclusives assureurs...",
"Simulation des conditions de marché...",
"Analyse des frais réels négociés...",
"Croisement des données partenaires...",
"Finalisation de votre sélection..."
];

let loaderText=document.getElementById("loaderText");

let interval=setInterval(()=>{

progress += 1.2;
document.getElementById("loaderBar").style.width=progress+"%";

let s=Math.floor((progress/100)*steps.length);

if(s!==step && s<steps.length){
step=s;
loaderText.innerText=steps[step];
}

if(progress>=100){
clearInterval(interval);
document.getElementById("loaderContainer").style.display="none";

/* build */
companies = buildCompanies();

ranked = companies
.map(c=>({...c,score:score(c)}))
.sort((a,b)=>b.score-a.score);

/* affichage initial */
showMore();

/* chart */
setTimeout(renderChart,500);
}

},30);
}

</script>
