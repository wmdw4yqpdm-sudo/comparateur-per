<script>

/* =========================
   SHUFFLE
========================= */
function shuffle(array){
for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* =========================
   BASE 32 COMPAGNIES
========================= */
const companiesBase=[
{name:"Generali"},
{name:"Groupama"},
{name:"MMA"},
{name:"April"},
{name:"AXA"},
{name:"SwissLife"},
{name:"Allianz"},
{name:"Aviva"},
{name:"CNP"},
{name:"AG2R"},
{name:"Malakoff"},
{name:"Gan"},
{name:"MACSF"},
{name:"Matmut"},
{name:"GMF"},
{name:"MAAF"},
{name:"Suravenir"},
{name:"Spirica"},
{name:"Cardif"},
{name:"Abeille"},
{name:"Apicil"},
{name:"Sogecap"},
{name:"BPCE Vie"},
{name:"Monceau"},
{name:"La Mondiale"},
{name:"Oradea"},
{name:"Neuflize"},
{name:"Primonial"},
{name:"UAF Life"},
{name:"Patrimoine Vie"},
{name:"SMABTP"},
{name:"Intencial"}
];

let ranked=[];
let visible=0;

/* =========================
   GENERATION COHERENTE
========================= */
function generate(){

let arr=[];

/* Generali toujours top */
arr.push({
name:"Generali",
entry:0.95,
exit:0,
yieldMin:5.8,
yieldMax:8.7
});

for(let i=1;i<companiesBase.length;i++){

let entry = +(1.2 + i*0.12 + Math.random()*0.3).toFixed(2);
let exit  = +(0.6 + i*0.10 + Math.random()*0.25).toFixed(2);

if(entry>5) entry=5;
if(exit>5) exit=5;

let maxYield = +(5.5 - i*0.09 - Math.random()*0.3).toFixed(2);
if(maxYield<2.2) maxYield=2.2;

let minYield = +(maxYield - (0.6 + Math.random()*0.8)).toFixed(2);
if(minYield<1.2) minYield=1.2;

arr.push({
name:companiesBase[i].name,
entry,
exit,
yieldMin:minYield,
yieldMax:maxYield
});
}

return arr;
}

/* =========================
   SCORE
========================= */
function score(c){
let avg=(c.yieldMin+c.yieldMax)/2;
return avg - (c.entry*0.6) - (c.exit*0.4);
}

/* =========================
   AFFICHAGE ITEM
========================= */
function renderItem(c,i){

let entryClass=c.entry<1.5?"best":c.entry<3?"medium":"low";
let exitClass=c.exit<1.5?"best":c.exit<3?"medium":"low";
let yClass=c.yieldMax>=5?"best":c.yieldMax>=3.5?"medium":"low";

let div=document.createElement("div");
div.className="company";

div.innerHTML=`
<strong>${i+1}. ${c.name}</strong><br>
Rendement : <span class="${yClass}">${c.yieldMin}% → ${c.yieldMax}%</span><br>
Frais entrée : <span class="${entryClass}">${c.entry}%</span><br>
Frais sortie : <span class="${exitClass}">${c.exit}%</span>
`;

document.getElementById("results").appendChild(div);

setTimeout(()=>div.classList.add("show"),50);
}

/* =========================
   AFFICHER PLUS
========================= */
function showMore(){

let next=visible+6;
if(next>ranked.length) next=ranked.length;

for(let i=visible;i<next;i++){
setTimeout(()=>renderItem(ranked[i],i),(i-visible)*120);
}

visible=next;

/* bouton caché quand fini */
if(visible>=ranked.length){
document.getElementById("btnMore").style.display="none";
}else{
document.getElementById("btnMore").style.display="block";
}
}

/* =========================
   SIMULATION (TON LOADER RESTE IDENTIQUE)
========================= */
function simulate(){

document.getElementById("results").innerHTML="";
document.getElementById("loaderContainer").style.display="block";
document.getElementById("btnMore").style.display="none";

visible=0;

let progress=0;
let step=0;

const steps=[
"Accès sécurisé au comparateur privé...",
"Vérification des accès partenaires agréés...",
"Chargement des grilles exclusives assureurs...",
"Simulation des conditions de marché...",
"Analyse des frais réels négociés...",
"Croisement des données partenaires...",
"Finalisation de votre sélection..."
];

let loaderText=document.getElementById("loaderText");

let interval=setInterval(()=>{

progress += 1.2;
document.getElementById("loaderBar").style.width=progress+"%";

let s=Math.floor((progress/100)*steps.length);

if(s!==step && s<steps.length){
step=s;
loaderText.innerText=steps[step];
}

if(progress>=100){
clearInterval(interval);
document.getElementById("loaderContainer").style.display="none";

ranked = generate()
.map(c=>({...c,score:score(c)}))
.sort((a,b)=>b.score-a.score);

/* affiche 1ère vague */
showMore();
}

},30);
}

/* =========================
   BUBBLES (inchangé)
========================= */
const canvas=document.getElementById("bubbleCanvas");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}
resize();
window.addEventListener("resize",resize);

let bubbles=[];
for(let i=0;i<80;i++){
bubbles.push({
x:Math.random()*w,
y:Math.random()*h,
r:3+Math.random()*4,
vy:0.3+Math.random()
});
}

function animate(){
ctx.clearRect(0,0,w,h);
for(let b of bubbles){
b.y-=b.vy;
if(b.y<0){b.y=h;b.x=Math.random()*w;}
ctx.beginPath();
ctx.fillStyle="#60a5fa";
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}
requestAnimationFrame(animate);
}
animate();

</script>
