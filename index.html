<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comparateur PER CGP Premium</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#031f94;
  --primary-dark:#02145f;
  --accent:#0ea5e9;
  --success:#16a34a;
  --warning:#f59e0b;
  --danger:#dc2626;
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
}

body{
  font-family:system-ui, Arial;
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;
  padding:22px;
}

.topbar{display:flex;gap:16px;align-items:center}
.logo{height:55px;background:white;padding:6px;border-radius:10px}
.title{font-size:24px;font-weight:800}
.subtitle{font-size:13px;opacity:.85}

.container{max-width:1000px;margin:auto;padding:20px}

.card{
  background:white;
  border-radius:16px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 6px 20px rgba(0,0,0,.06);
}

input{
  width:100%;padding:10px;margin:6px 0;
  border-radius:10px;border:1px solid #e2e8f0;
}

button{
  width:100%;padding:12px;border:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;font-weight:700;
  cursor:pointer;
}

.client-box{
  background:#eef2ff;
  padding:12px;border-radius:12px;
  border-left:5px solid var(--primary);
}

.company{padding:12px;border-bottom:1px solid #eee}
.rank{font-weight:800}

.best{color:var(--success);font-weight:700}
.medium{color:var(--warning);font-weight:700}
.low{color:var(--danger);font-weight:700}

/* loader */
.loader-box{display:none;text-align:center;margin-top:10px}
.hourglass{
  width:40px;height:40px;margin:10px auto;
  border:4px solid var(--primary);
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.progress{height:20px;background:#e5e7eb;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--accent),var(--success))}

.kpi{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.kpi div{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.reco{
  background:#ecfeff;
  padding:12px;
  border-radius:12px;
  border-left:5px solid var(--accent);
}

.fade{
  animation:fade .4s ease-in;
}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
</style>
</head>

<body>

<header>
<div class="topbar">
<img class="logo" src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80">
<div>
<div class="title">Comparateur PER CGP Premium</div>
<div class="subtitle">Analyse patrimoniale avancée</div>
</div>
</div>
</header>

<div class="container">

<div class="card">
<h2>Profil client</h2>
<input id="firstname" placeholder="Prénom">
<input id="name" placeholder="Nom">
<input id="profession" placeholder="Profession">
<input id="income" type="number" placeholder="Revenus">
<input id="age" type="number" placeholder="Âge">
<input id="horizon" type="number" placeholder="Horizon (années)">
<button onclick="start()">Analyser</button>

<div class="loader-box" id="loader">
<div class="hourglass"></div>
<div class="progress"><div class="bar" id="bar"></div></div>
<div id="txt">Analyse...</div>
</div>
</div>

<div class="card">
<h2>Dashboard</h2>
<div id="kpi"></div>
</div>

<div class="card">
<h2>Classement</h2>
<div id="results"></div>
</div>

<div class="card">
<h2>Projection retraite</h2>
<div id="projection"></div>
</div>

<div class="card">
<button onclick="exportPDF()">Télécharger rapport PDF</button>
</div>

</div>

<script>

const data=[
{name:"Generali",entry:0.9,exit:0,y1:6,y2:8.5},
{name:"Groupama",entry:1.8,exit:1,y1:4.3,y2:5.2},
{name:"MMA",entry:2.6,exit:1.4,y1:3.6,y2:4.2},
{name:"April",entry:3.2,exit:2,y1:3.1,y2:3.8},
{name:"Axa",entry:4.4,exit:2.5,y1:2.9,y2:3.5}
];

function score(c){
let r=(c.y1+c.y2)/2;
return r-(c.entry*0.6)-(c.exit*0.4);
}

function color(r){return r<3.5?"#dc2626":r<5?"#f59e0b":"#16a34a"}

function start(){

document.getElementById("loader").style.display="block";
let b=document.getElementById("bar");
let t=document.getElementById("txt");
let steps=["Profil...","Frais...","Rendements...","Optimisation...","Finalisation..."];
let i=0,p=0;

let timer=setInterval(()=>{
  p++;
  b.style.width=p+"%";
  if(p%20==0)t.innerText=steps[i++];
  if(p>=100){clearInterval(timer);setTimeout(run,500)}
},600);
}

function run(){

document.getElementById("loader").style.display="none";

let age=+document.getElementById("age").value;
let income=+document.getElementById("income").value;
let horizon=+document.getElementById("horizon").value;

let ranked=data.map(c=>({...c,score:score(c)})).sort((a,b)=>b.score-a.score);

// KPI
let best=ranked[0];
document.getElementById("kpi").innerHTML=`
<div class='kpi'>
<div><b>Score global</b><br>${best.score.toFixed(1)}/10</div>
<div><b>Top PER</b><br>${best.name}</div>
<div><b>Potentiel</b><br>Optimisation élevée</div>
</div>`;

// ranking
let html="";
ranked.forEach((c,i)=>{
let r=(c.y1+c.y2)/2;
html+=`<div class='company fade'>
<div class='rank'>${i+1}. ${c.name}</div>
<div>Rendement: <span style='color:${color(r)}'>${c.y1}% → ${c.y2}%</span></div>
<div>Frais: ${c.entry}% / ${c.exit}%</div>
<div>Score: ${c.score.toFixed(2)}</div>
</div>`
});
document.getElementById("results").innerHTML=html;

// projection simple
let monthly=500;
let years=20;
let capital=Math.round(monthly*12*years*1.8);

document.getElementById("projection").innerHTML=`
<div class='reco'>
<b>Projection retraite</b><br>
Versement: 500€/mois<br>
Capital estimé: ${capital.toLocaleString()}€
</div>`;

}

function exportPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("Rapport PER - CGP",10,10);
doc.text(document.getElementById("results").innerText,10,20);
doc.save("rapport.pdf");
}

</script>

</body>
</html>
