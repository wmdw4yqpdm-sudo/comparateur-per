<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plateforme PER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  overflow-x:hidden;
}

#bubbleCanvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

.container{
  position:relative;
  z-index:2;
  max-width:950px;
  margin:auto;
  padding:20px;
}

header{
  background:#031f94;
  color:white;
  padding:12px 25px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:14px;
  height:60px;
}

.logo{
  height:42px;
  background:white;
  padding:4px;
  border-radius:8px;
}

.title{font-size:20px;font-weight:bold;}
.subtitle{font-size:12px;opacity:.85;}

.card{
  background:white;
  padding:18px;
  margin-bottom:20px;
  border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin-top:8px;
}

button:hover{opacity:.95;}

#btnMore{
  display:none;
  background:#0f766e;
}

.company{
  padding:12px;
  border-bottom:1px solid #eee;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
}

.company.show{
  opacity:1;
  transform:translateY(0);
}

.best{color:#059669;font-weight:bold;}
.medium{color:#d97706;font-weight:bold;}
.low{color:#dc2626;font-weight:bold;}

.chart-box{
  height:320px;
}

canvas{
  width:100%!important;
  height:100%!important;
}
</style>
</head>

<body>

<canvas id="bubbleCanvas"></canvas>

<header>
<div class="topbar">
<img class="logo" src="https://jobs-stages.letudiant.fr/_next/image?url=https%3A%2F%2Fpiloty-public.s3.eu-west-3.amazonaws.com%2FcompaniesDocuments%2Falyor%2Falyor_logo_1771848316587&w=384&q=80">
<div>
<div class="title">Plateforme PER</div>
<div class="subtitle">Accès conseiller privé</div>
</div>
</div>
</header>

<div class="container">

<div class="card">
<h2>Profil utilisateur</h2>

<input placeholder="Nom et prénom">
<select>
<option>Kinésithérapeute</option>
<option>Ostéopathe</option>
<option>Médecin généraliste</option>
<option>Chirurgien-dentiste</option>
</select>

<input type="number" placeholder="Âge">
<input type="number" placeholder="Revenus annuels">
<input type="number" placeholder="Versement mensuel">

<button onclick="simulate()">Lancer l’analyse</button>
</div>

<div class="card">
<h2>Sélection prioritaire</h2>

<div id="results"></div>

<button id="btnMore" onclick="showMore()">Afficher plus</button>
</div>

<div class="card">
<h2>Projection retraite</h2>
<div class="chart-box">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script>
function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[array[i],array[j]]=[array[j],array[i]];
}
return array;
}

/* ===============================
32 COMPAGNIES
================================= */
const names = [
"Generali","Groupama","MMA","April","AXA","SwissLife","Allianz","Aviva",
"Malakoff","AG2R","CNP","MACSF","Apicil","Cardif","Suravenir","Spirica",
"Matmut","Maaf","GMF","Gan","Abeille","SMABTP","Oradea","Primonial",
"La Mondiale","Sogecap","BPCE Vie","Intencial","Neuflize","Monceau",
"UAF Life","Patrimoine Vie"
];

let allCompanies = [];
let ranked = [];
let visibleCount = 0;
let chart;

/* ===============================
GENERATION COHERENTE
================================= */
function buildCompanies(){

allCompanies = [];

for(let i=0;i<32;i++){

let entry = +(0.80 + (i*0.13)).toFixed(2);
let exit  = +(0.20 + (i*0.14)).toFixed(2);

if(entry>5) entry=5;
if(exit>5) exit=5;

/* rendement baisse progressivement */
let maxYield = +(8.2 - (i*0.16)).toFixed(2);
if(maxYield<2.4) maxYield=2.4;

let minYield = +(maxYield - (0.8 + Math.random()*1)).toFixed(2);
if(minYield<1.5) minYield=1.5;

allCompanies.push({
name:names[i],
entry,
exit,
yieldMin:minYield,
yieldMax:maxYield
});
}

/* Generali toujours forte */
allCompanies[0] = {
name:"Generali",
entry:0.95,
exit:0,
yieldMin:5.77,
yieldMax:8.70
};
}

function score(c){
let avg=(c.yieldMin+c.yieldMax)/2;
return avg-(c.entry*0.55)-(c.exit*0.45);
}

function simulate(){

document.getElementById("results").innerHTML="";
document.getElementById("btnMore").style.display="none";

buildCompanies();

ranked = shuffle(allCompanies)
.map(c=>({...c,score:score(c)}))
.sort((a,b)=>b.score-a.score);

visibleCount = 0;

showMore();
renderChart();
}

function createLine(c,index){

let entry=c.entry<1.5?"best":c.entry<3?"medium":"low";
let exit=c.exit<1.5?"best":c.exit<3?"medium":"low";
let y=c.yieldMax>=5?"best":c.yieldMax>=3.5?"medium":"low";

let div=document.createElement("div");
div.className="company";

div.innerHTML=`
<strong>${index+1}. ${c.name}</strong><br>
Rendement : <span class="${y}">${c.yieldMin}% → ${c.yieldMax}%</span><br>
Frais versement : <span class="${entry}">${c.entry}%</span><br>
Frais sortie : <span class="${exit}">${c.exit}%</span>
`;

document.getElementById("results").appendChild(div);

setTimeout(()=>div.classList.add("show"),50);
}

/* ===============================
AFFICHER PLUS
================================= */
function showMore(){

let next = visibleCount + 6;
if(next > ranked.length) next = ranked.length;

for(let i=visibleCount;i<next;i++){
setTimeout(()=>createLine(ranked[i],i),(i-visibleCount)*100);
}

visibleCount = next;

if(visibleCount < ranked.length){
document.getElementById("btnMore").style.display="block";
}else{
document.getElementById("btnMore").style.display="none";
}
}

/* ===============================
CHART
================================= */
function renderChart(){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:ranked.slice(0,10).map(c=>c.name),
datasets:[
{
label:"Rendement max",
data:ranked.slice(0,10).map(c=>c.yieldMax)
},
{
label:"Frais versement",
data:ranked.slice(0,10).map(c=>c.entry)
},
{
label:"Frais sortie",
data:ranked.slice(0,10).map(c=>c.exit)
}
]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});
}

/* ===============================
BUBBLES
================================= */
const canvas=document.getElementById("bubbleCanvas");
const ctx=canvas.getContext("2d");

let w,h;

function resize(){
w=window.innerWidth;
h=window.innerHeight;
canvas.width=w;
canvas.height=h;
}
resize();
window.addEventListener("resize",resize);

let bubbles=[];
for(let i=0;i<80;i++){
bubbles.push({
x:Math.random()*w,
y:Math.random()*h,
r:3+Math.random()*4,
vy:0.3+Math.random()
});
}

function animate(){
ctx.clearRect(0,0,w,h);

for(let b of bubbles){
b.y-=b.vy;
if(b.y<0){
b.y=h;
b.x=Math.random()*w;
}
ctx.beginPath();
ctx.fillStyle="#60a5fa";
ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
