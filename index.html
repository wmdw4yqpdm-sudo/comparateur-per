<script>

window.onload = function(){

try {

/* =========================
   VARIABLES SAFE
========================= */
let companies=[];
let ranked=[];
let visible=0;
let chartInstance=null;

/* =========================
   DONNÉES
========================= */
const names=[
"Generali","Groupama","MMA","April","AXA","SwissLife","Allianz","Aviva",
"CNP","AG2R","Malakoff","Gan","MACSF","Matmut","GMF","MAAF",
"Suravenir","Spirica","Cardif","Abeille","Apicil","Sogecap",
"BPCE Vie","Monceau","La Mondiale","Oradea","Neuflize","Primonial",
"UAF Life","Patrimoine Vie","SMABTP","Intencial"
];

/* =========================
   GENERATION SAFE
========================= */
function build(){

let arr=[];

for(let i=0;i<names.length;i++){

let entry=Math.min(5,(1+i*0.12+Math.random()*0.3));
let exit=Math.min(5,(0.4+i*0.1+Math.random()*0.2));

let max=6.2-i*0.09;
if(max<2.2) max=2.2;

let min=max-(0.5+Math.random()*0.7);
if(min<1.2) min=1.2;

arr.push({
name:names[i],
entry:+entry.toFixed(2),
exit:+exit.toFixed(2),
yieldMin:+min.toFixed(2),
yieldMax:+max.toFixed(2)
});
}

arr[0]={
name:"Generali",
entry:0.95,
exit:0,
yieldMin:5.77,
yieldMax:8.7
};

return arr;
}

/* =========================
   SCORE
========================= */
function score(c){
return ((c.yieldMin+c.yieldMax)/2) - c.entry*0.6 - c.exit*0.4;
}

/* =========================
   SAFE DOM CHECK
========================= */
function el(id){
return document.getElementById(id);
}

/* =========================
   AFFICHAGE
========================= */
function render(c,i){

let box=el("results");
if(!box) return;

let div=document.createElement("div");
div.className="company";

div.innerHTML=`
<strong>${i+1}. ${c.name}</strong><br>
Rendement : ${c.yieldMin}% → ${c.yieldMax}%<br>
Frais : entrée ${c.entry}% / sortie ${c.exit}%
`;

box.appendChild(div);

setTimeout(()=>div.classList.add("show"),50);
}

/* =========================
   SHOW MORE SAFE
========================= */
window.showMore=function(){

let next=visible+6;
if(next>ranked.length) next=ranked.length;

for(let i=visible;i<next;i++){
render(ranked[i],i);
}

visible=next;

let btn=el("btnMore");
if(btn){
btn.style.display=(visible>=ranked.length)?"none":"block";
}
};

/* =========================
   SIMULATE SAFE
========================= */
window.simulate=function(){

let box=el("results");
if(box) box.innerHTML="";

let loader=el("loaderContainer");
if(loader) loader.style.display="block";

visible=0;

let progress=0;

let steps=["Chargement...","Analyse...","Finalisation..."];
let step=0;

let txt=el("loaderText");

let interval=setInterval(()=>{

progress+=2;

let bar=el("loaderBar");
if(bar) bar.style.width=progress+"%";

if(progress>30 && step===0){step=1;if(txt)txt.innerText=steps[1];}
if(progress>70 && step===1){step=2;if(txt)txt.innerText=steps[2];}

if(progress>=100){
clearInterval(interval);
if(loader) loader.style.display="none";

companies=build();
ranked=companies.map(c=>({...c,score:score(c)}))
.sort((a,b)=>b.score-a.score);

showMore();
}

},30);

};

}catch(e){
document.body.innerHTML="<h2 style='color:red'>Erreur JS : "+e.message+"</h2>";
console.log(e);
}

};

</script>
